<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 300px;
      min-height: 180px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #1e293b;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #f8fafc;
    }

    .header .logo {
      font-size: 20px;
    }

    .status-card {
      background: #1e293b;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    .status-dot.ready { background: #10b981; box-shadow: 0 0 8px #10b98166; }
    .status-dot.plotting { background: #f59e0b; box-shadow: 0 0 8px #f59e0b66; }
    .status-dot.proving { background: #3b82f6; box-shadow: 0 0 8px #3b82f666; }
    .status-dot.offline { background: #ef4444; box-shadow: 0 0 8px #ef444466; }
    .status-dot.error { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-text {
      font-size: 15px;
      font-weight: 600;
    }

    .status-text.ready { color: #10b981; }
    .status-text.plotting { color: #f59e0b; }
    .status-text.proving { color: #3b82f6; }
    .status-text.offline { color: #ef4444; }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .info-item {
      background: #0f172a;
      padding: 8px 10px;
      border-radius: 6px;
    }

    .info-label {
      font-size: 10px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .info-value {
      font-size: 14px;
      font-weight: 600;
      color: #f1f5f9;
      margin-top: 2px;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: #334155;
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    .footer {
      text-align: center;
      font-size: 10px;
      color: #475569;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🛡️</span>
    <h1>PoS-CAPTCHA Status</h1>
  </div>

  <div class="status-card">
    <div class="status-indicator">
      <div class="status-dot offline" id="statusDot"></div>
      <span class="status-text offline" id="statusText">Checking...</span>
    </div>

    <div class="info-grid">
      <div class="info-item">
        <div class="info-label">Disk Used</div>
        <div class="info-value" id="diskUsed">—</div>
      </div>
      <div class="info-item">
        <div class="info-label">Block Groups</div>
        <div class="info-value" id="blockGroups">—</div>
      </div>
    </div>

    <div class="progress-bar" id="progressBar" style="display: none;">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
  </div>

  <div class="footer">
    Polling http://127.0.0.1:7331/status
  </div>

  <script src="popup.js"></script>
</body>
</html>
